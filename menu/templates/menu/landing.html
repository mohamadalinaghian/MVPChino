<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>انتخاب منو</title>
    <style>
      :root {
        --gold: #d4af37;
        --black: #121212;
        --dark-gray: #1e1e1e;
        --text-light: #f5f5f5;
        --rich-green: #0a3a2a; /* سبز پولداری */
        --straw-yellow: #e8d888; /* زرد کاهی */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          Tahoma,
          Arial,
          sans-serif;
        background-color: var(--black);
        color: var(--text-light);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 20px;
      }

      .brand-frame {
        border: 2px solid var(--gold);
        padding: 25px 40px;
        text-align: center;
        border-radius: 15px;
        margin-bottom: 25px;
        background: linear-gradient(145deg, var(--dark-gray), var(--black));
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.1);
        width: 100%;
        max-width: 500px;
      }

      .brand-frame h1 {
        color: var(--gold);
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 1px;
        text-align: center;
      }

      .instruction {
        color: #aaa;
        font-size: 16px;
        margin-bottom: 40px;
        text-align: center;
      }

      .menu-options {
        display: flex;
        flex-direction: row; /* چیدمان افقی */
        justify-content: center;
        gap: 20px;
        width: 100%;
        max-width: 600px;
        flex-wrap: wrap; /* برای صفحه‌های خیلی کوچک موبایل */
      }

      .menu-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 15px;
        flex: 1;
        min-width: 200px;
        padding: 35px 20px; /* کادر گرد و تپل */
        text-decoration: none;
        border-radius: 35px; /* گوشه‌های کاملا گرد */
        font-size: 18px;
        font-weight: bold;
        text-align: center;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
      }

      .menu-btn:hover {
        transform: translateY(-5px);
      }

      .btn-vip {
        background-color: var(--rich-green);
        color: var(--gold);
        border: 3px solid var(--gold);
        box-shadow: 0 8px 20px rgba(10, 58, 42, 0.5);
      }

      .btn-eco {
        background-color: var(--straw-yellow);
        color: #2c3e50;
        border: 3px solid #d1c177;
        box-shadow: 0 8px 20px rgba(232, 216, 136, 0.2);
      }

      .icon {
        width: 45px;
        height: 45px;
        fill: currentColor;
      }
    </style>
  </head>
  <body>
    <div class="brand-frame">
      <h1>کافه تخصصی ما</h1>
    </div>

    <p class="instruction">
      لطفاً برای مشاهده آیتم‌ها، سبک منوی خود را انتخاب کنید.
    </p>

    <div class="menu-options">
      <!-- VIP / Signature Button -->
      <a
        href="{% url 'menu:menu_list' menu_type='vip' %}"
        class="menu-btn btn-vip"
      >
        <svg class="icon" viewBox="0 0 24 24">
          <path d="M12 2L15 9H22L16 14L18 21L12 17L6 21L8 14L2 9H9L12 2Z" />
        </svg>
        <span class="btn-title"
          >چینوِ امضا <span class="en-btn-title">(Chino Signature)</span></span
        >
        <small class="btn-desc">لاین قهوه‌های تخصصی و رسپی‌های خاص شف</small>
      </a>

      <!-- ECO / Everyday Button -->
      <a
        href="{% url 'menu:menu_list' menu_type='eco' %}"
        class="menu-btn btn-eco"
      >
        <svg class="icon" viewBox="0 0 24 24">
          <path
            d="M20 3H4v10c0 2.21 1.79 4 4 4h6c2.21 0 4-1.79 4-4v-3h2c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 5h-2V5h2v3zM4 19h16v2H4z"
          />
        </svg>
        <span class="btn-title"
          >چینوِ روزمره <span class="en-btn-title">(Chino Everyday)</span></span
        >
        <small class="btn-desc"
          >آیتم‌های محبوب، سریع و مناسب دورهمی‌های طولانی</small
        >
      </a>
    </div>
  </body>
</html>
