{% load humanize %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>پنل صندوق - POS</title>
    <script src="https://unpkg.com/htmx.org@1.9.11"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: Tahoma, Arial, sans-serif; margin: 0; padding: 20px; }
        .pos-container { display: flex; gap: 20px; height: 95vh; }
        .menu-section { flex: 2; overflow-y: auto; padding-left: 10px; }
        .cart-section { flex: 1; background-color: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; display: flex; flex-direction: column; }
        .category-title { border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 20px; color: #bbb; font-size: 1.2em; font-weight: bold;}
        .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
        .menu-item { background-color: #2c2c2c; border: 1px solid #444; padding: 15px 10px; border-radius: 6px; text-align: center; cursor: pointer; user-select: none; }
        .menu-item:hover { background-color: #3d3d3d; }
        .menu-item-price { color: #4caf50; font-weight: bold; margin-top: 5px; font-size: 0.9em; direction: ltr; }
        #cart-container { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;}
    </style>
</head>
<body>

<div class="pos-container">
    <!-- Cart Section (Right side in RTL) -->
    <div class="cart-section">
        <h2 style="margin-top: 0;">سفارش فعلی</h2>
        <div id="cart-container">
            {% include "order/partials/cart.html" %}
        </div>
    </div>

    <!-- Menu Section (Left side in RTL) -->
    <div class="menu-section">
        <h2 style="margin-top: 0;">منو</h2>
        {% for category in categories %}
            <div class="category-title">{{ category.title }}</div>
            <div class="items-grid">
                {% for item in category.items.all %}
                    {% if item.is_active %}
                        <div class="menu-item" 
                             hx-post="{% url 'order:add_to_cart' item.id %}" 
                             hx-target="#cart-container" 
                             hx-swap="innerHTML">
                            <div>{{ item.title }}</div>
                            <div class="menu-item-price">{{ item.price|intcomma }} تومان</div>
                        </div>
                    {% endif %}
                {% endfor %}
            </div>
        {% endfor %}
    </div>
</div>

<script>
    document.body.addEventListener('htmx:configRequest', (event) => {
        event.detail.headers['X-CSRFToken'] = '{{ csrf_token }}';
    });
</script>

</body>
</html>
